<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HSE Feature Intake — Admin</title>
<style>
:root {
  --c-dark: #003D35;
  --c-primary: #005C4E;
  --c-accent: #007A6A;
  --c-light: #EDF6F4;
  --c-mid: #B8DDD7;
  --c-white: #FFFFFF;
  --c-text: #1C2B2A;
  --c-muted: #527570;
  --c-border: #C5DEDA;
  --c-warn-bg: #FFF8E6;
  --c-warn: #8A6200;
  --c-warn-border: #EDD97A;
  --c-err-bg: #FFF0F0;
  --c-err: #C0392B;
  --c-ok-bg: #E6F5F1;
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --c-bg: #F5F9F8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Segoe UI', Arial, sans-serif; background: var(--c-bg); color: var(--c-text); min-height: 100vh; font-size: 14px; }

a { color: var(--c-primary); }
a:hover { color: var(--c-dark); }

.app-header {
  background: var(--c-white);
  border-bottom: 1px solid var(--c-border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 5;
}
.app-header .hse-mark { width: 36px; height: 36px; background: var(--c-primary); border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.app-header .hse-mark svg { fill: white; }
.app-header h1 { font-size: 16px; font-weight: 600; color: var(--c-dark); line-height: 1.2; }
.app-header p { font-size: 12px; color: var(--c-muted); margin-top: 2px; }
.app-header .grow { flex: 1; }
.app-header a.back-link, .app-header button.back-link {
  background: transparent;
  border: 1px solid var(--c-border);
  color: var(--c-muted);
  padding: 7px 14px;
  border-radius: var(--r-sm);
  font-size: 13px;
  text-decoration: none;
  font-family: inherit;
  cursor: pointer;
  transition: all .15s;
}
.app-header a.back-link:hover { background: var(--c-light); color: var(--c-primary); border-color: var(--c-accent); }

.layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: calc(100vh - 65px);
}

/* Sidebar */
.sidebar {
  background: var(--c-white);
  border-right: 1px solid var(--c-border);
  padding: 20px 12px;
  position: sticky;
  top: 65px;
  align-self: start;
  height: calc(100vh - 65px);
  overflow-y: auto;
}
.sidebar h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--c-muted); padding: 4px 10px; margin-bottom: 8px; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--r-sm);
  cursor: pointer;
  color: var(--c-text);
  font-size: 13px;
  font-weight: 500;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  font-family: inherit;
  margin-bottom: 2px;
  position: relative;
}
.nav-item:hover { background: var(--c-light); }
.nav-item.active { background: var(--c-primary); color: white; }
.nav-item .nav-icon { width: 18px; height: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.nav-item .nav-desc { font-size: 11px; color: var(--c-muted); font-weight: 400; margin-top: 2px; }
.nav-item.active .nav-desc { color: rgba(255,255,255,.8); }
.nav-item .nav-main { flex: 1; }
.nav-item .dirty-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--c-warn);
  flex-shrink: 0;
  display: none;
}
.nav-item.dirty .dirty-dot { display: block; }
.nav-item.active .dirty-dot { background: #FFD64A; }

/* Content */
.content { padding: 28px 32px; max-width: 960px; }
.content-head { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
.content-head h1 { font-size: 22px; color: var(--c-dark); font-weight: 600; line-height: 1.2; }
.content-head p.subtitle { font-size: 13px; color: var(--c-muted); margin-top: 4px; max-width: 640px; line-height: 1.55; }
.content-head .spacer { flex: 1; }

.status-line {
  font-size: 12px;
  color: var(--c-muted);
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 18px;
}
.status-line.ok { color: var(--c-accent); }
.status-line.err { color: var(--c-err); }

.save-bar {
  position: sticky;
  bottom: 0;
  background: var(--c-white);
  border-top: 1px solid var(--c-border);
  padding: 12px 16px;
  margin: 24px -32px -28px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 -2px 8px rgba(0,0,0,.05);
  z-index: 4;
}
.btn { padding: 8px 18px; border-radius: var(--r-sm); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; border: none; transition: all .15s; }
.btn-primary { background: var(--c-primary); color: white; }
.btn-primary:hover { background: var(--c-dark); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--c-muted); border: 1px solid var(--c-border); }
.btn-ghost:hover { background: var(--c-light); }
.btn-danger { background: transparent; color: var(--c-err); border: 1px solid #FFCCCC; }
.btn-danger:hover { background: var(--c-err-bg); }
.btn-link { background: transparent; border: none; color: var(--c-primary); cursor: pointer; font: inherit; font-size: 12px; padding: 2px 4px; }
.btn-link:hover { text-decoration: underline; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Cards & sections */
.card {
  background: var(--c-white);
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  margin-bottom: 16px;
  overflow: hidden;
}
.card-head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--c-border);
  background: #FBFDFC;
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-head h3 { font-size: 14px; font-weight: 600; color: var(--c-dark); }
.card-head .card-desc { font-size: 11px; color: var(--c-muted); font-weight: 400; margin-top: 2px; }
.card-head .spacer { flex: 1; }
.card-body { padding: 14px 16px; }

.section-help {
  font-size: 12px;
  color: var(--c-muted);
  line-height: 1.55;
  margin-bottom: 12px;
  background: var(--c-light);
  border-radius: var(--r-sm);
  padding: 8px 12px;
}

/* Fields */
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--c-muted);
  text-transform: uppercase;
  letter-spacing: .04em;
  margin-bottom: 5px;
}
.field .hint { font-size: 11px; color: var(--c-muted); font-weight: 400; text-transform: none; letter-spacing: 0; margin-top: 4px; line-height: 1.45; }
.field input[type=text],
.field input[type=number],
.field textarea,
.field select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--c-border);
  border-radius: var(--r-sm);
  font-size: 13px;
  color: var(--c-text);
  background: var(--c-white);
  outline: none;
  font-family: inherit;
  transition: border-color .15s;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--c-accent); }
.field textarea { resize: vertical; min-height: 72px; line-height: 1.55; font-family: inherit; }
.field textarea.mono { font-family: 'Menlo', 'Consolas', monospace; font-size: 12.5px; line-height: 1.6; background: #FAFCFB; }

.row-grid {
  display: grid;
  gap: 8px;
  align-items: start;
  margin-bottom: 8px;
}
.row-grid input, .row-grid textarea, .row-grid select {
  width: 100%;
  padding: 7px 9px;
  border: 1px solid var(--c-border);
  border-radius: var(--r-sm);
  font-size: 13px;
  color: var(--c-text);
  background: var(--c-white);
  outline: none;
  font-family: inherit;
}
.row-grid input:focus, .row-grid textarea:focus, .row-grid select:focus { border-color: var(--c-accent); }

.row-controls { display: flex; gap: 4px; align-items: center; padding-top: 2px; }
.icon-btn-sm {
  width: 26px;
  height: 26px;
  border-radius: var(--r-sm);
  border: 1px solid var(--c-border);
  background: var(--c-white);
  color: var(--c-muted);
  cursor: pointer;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  font-family: inherit;
}
.icon-btn-sm:hover { background: var(--c-light); color: var(--c-primary); border-color: var(--c-accent); }
.icon-btn-sm:disabled { opacity: .35; cursor: not-allowed; }
.icon-btn-sm.danger:hover { background: var(--c-err-bg); color: var(--c-err); border-color: #FFCCCC; }

.col-labels {
  display: grid;
  gap: 8px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--c-muted);
  margin-bottom: 4px;
  padding: 0 2px;
}

.add-btn-row {
  margin-top: 8px;
  display: flex;
  gap: 8px;
}
.add-btn {
  padding: 6px 12px;
  border: 1px dashed var(--c-border);
  background: transparent;
  color: var(--c-primary);
  border-radius: var(--r-sm);
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  font-family: inherit;
}
.add-btn:hover { background: var(--c-light); border-color: var(--c-accent); border-style: solid; }

/* Banners */
.banner {
  border-radius: var(--r-md);
  padding: 12px 14px;
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 16px;
  border: 1px solid;
}
.banner.warn { background: var(--c-warn-bg); border-color: var(--c-warn-border); color: var(--c-warn); }
.banner.info { background: var(--c-light); border-color: var(--c-border); color: var(--c-text); }
.banner.err { background: var(--c-err-bg); border-color: #FFCCCC; color: var(--c-err); }
.banner strong { font-weight: 700; }

/* Accordion (personas) */
.accordion-item {
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  background: var(--c-white);
  margin-bottom: 10px;
  overflow: hidden;
}
.accordion-head {
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  background: #FBFDFC;
  border: none;
  width: 100%;
  font-family: inherit;
  font-size: 14px;
  color: var(--c-text);
  text-align: left;
}
.accordion-head:hover { background: var(--c-light); }
.accordion-head .chev { color: var(--c-muted); transition: transform .15s; }
.accordion-item.open .accordion-head .chev { transform: rotate(90deg); }
.accordion-head strong { font-weight: 600; color: var(--c-dark); }
.accordion-head .sub { font-size: 12px; color: var(--c-muted); font-weight: 400; }
.accordion-body { padding: 14px 16px; border-top: 1px solid var(--c-border); display: none; }
.accordion-item.open .accordion-body { display: block; }
.accordion-controls { display: flex; gap: 4px; margin-left: auto; }

/* Raw markdown advanced section */
.advanced {
  margin-top: 20px;
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  background: var(--c-white);
}
.advanced summary {
  padding: 10px 14px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  color: var(--c-muted);
  text-transform: uppercase;
  letter-spacing: .04em;
  list-style: none;
  user-select: none;
}
.advanced summary::-webkit-details-marker { display: none; }
.advanced summary::before { content: '▸ '; display: inline-block; transition: transform .15s; }
.advanced[open] summary::before { transform: rotate(90deg); }
.advanced[open] summary { border-bottom: 1px solid var(--c-border); }
.advanced-body { padding: 12px 14px; }
.advanced textarea {
  width: 100%;
  min-height: 280px;
  padding: 10px 12px;
  border: 1px solid var(--c-border);
  border-radius: var(--r-sm);
  font-family: 'Menlo', 'Consolas', monospace;
  font-size: 12.5px;
  line-height: 1.6;
  color: var(--c-text);
  background: #FAFCFB;
  outline: none;
  resize: vertical;
}
.advanced textarea:focus { border-color: var(--c-accent); background: var(--c-white); }
.advanced-foot { margin-top: 8px; display: flex; gap: 8px; align-items: center; }

/* Colour swatch */
.swatch {
  width: 22px;
  height: 22px;
  border-radius: 4px;
  border: 1px solid var(--c-border);
  flex-shrink: 0;
}

/* Loading */
.loading { display: flex; align-items: center; gap: 10px; padding: 2rem 0; color: var(--c-muted); font-size: 13px; }
.dots { display: flex; gap: 4px; }
.dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--c-accent); animation: blink 1.1s infinite; }
.dots span:nth-child(2) { animation-delay: .22s; }
.dots span:nth-child(3) { animation-delay: .44s; }
@keyframes blink { 0%,100%{opacity:.2}50%{opacity:1} }

.boot-status {
  max-width: 640px;
  margin: 48px auto;
  padding: 32px;
  background: var(--c-white);
  border: 1px solid var(--c-border);
  border-radius: var(--r-md);
  text-align: center;
}
.boot-status.err { border-color: #FFCCCC; background: var(--c-err-bg); color: var(--c-err); }
.boot-status h2 { font-size: 16px; color: var(--c-dark); margin-bottom: 8px; }
.boot-status p { font-size: 13px; color: var(--c-muted); line-height: 1.55; }

@media (max-width: 820px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--c-border); }
  .content { padding: 20px 16px; }
  .save-bar { margin: 16px -16px -20px; }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="hse-mark">
    <svg width="22" height="16" viewBox="0 0 22 16">
      <rect x="0" y="0" width="9" height="7"/>
      <rect x="11" y="0" width="11" height="2.5"/>
      <rect x="11" y="4.5" width="11" height="2.5"/>
      <rect x="0" y="9" width="22" height="7"/>
    </svg>
  </div>
  <div>
    <h1>Intake tool — admin</h1>
    <p>Edit the configuration files that power the intake tool. Changes save directly to the markdown files on disk.</p>
  </div>
  <div class="grow"></div>
  <a class="back-link" href="hse-feature-intake.html">← Back to intake tool</a>
</header>

<div id="bootStatus" class="boot-status">
  <div class="loading" style="justify-content:center">
    <div class="dots"><span></span><span></span><span></span></div>
    Loading config files...
  </div>
</div>

<div id="mainLayout" class="layout" style="display:none">
  <aside class="sidebar" id="sidebar">
    <h2>Config files</h2>
    <div id="navList"></div>
  </aside>
  <main class="content" id="content"></main>
</div>

<script src="admin.js"></script>
</body>
</html>
